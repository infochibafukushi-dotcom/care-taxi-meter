<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="介護タクシー専用メーターアプリの初期プロジェクト"
    />
    <title>介護タクシー専用メーター</title>

    <script>
      ;(() => {
        const releaseOrientation = () => {
          try {
            screen.orientation?.unlock?.()
          } catch {
            // ignore
          }
          try {
            screen.unlockOrientation?.()
          } catch {
            // ignore
          }
        }

        releaseOrientation()
        window.addEventListener('pageshow', releaseOrientation)
      })()
    </script>

    <script>
      ;(() => {
        const basePath = '%BASE_URL%'
        const params = new URLSearchParams(window.location.search)
        const redirectPath = params.get('redirect')

        if (!redirectPath) return

        params.delete('redirect')
        const remainingQuery = params.toString()
        const [pathAndSearch, hash = ''] = redirectPath.split('#')
        const [path, embeddedQuery = ''] = pathAndSearch.split('?')
        const queryParts = [embeddedQuery, remainingQuery].filter(Boolean)
        const query = queryParts.length ? `?${queryParts.join('&')}` : ''
        const normalizedPath = path.replace(/^\/+/, '')
        const target = `${basePath}${normalizedPath}${query}${hash ? `#${hash}` : ''}`

        window.history.replaceState(null, '', target)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
